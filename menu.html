<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Menu | Bake 'n Slurp</title>
        <link rel="stylesheet" href="styles.css">
        <script src="components.js"></script>
    </head>
<body>
    <bake-header></bake-header>
    <main class="container">
        <div class="banner">
            <img src="images/menu-banner.jpg" alt="Products">
            <h2>PRODUCTS</h2>
        </div>

        <div class="menu-layout">
            <aside class="sidebar">
                <h3>Menu</h3>
                <p>PRODUCT CAT</p>
                <ul>
                    <li class="active">Cakes</li>
                    <li>Sandwiches</li>
                    <li>Treats</li>
                    <li>Drinks</li>
                </ul>
            </aside>

            <section class="menu-content">
                <div class="menu-header">
                    <h2>Cakes</h2>
                    <input type="text" placeholder="Search" class="search-bar">
                </div>
                <div class="product-grid">
                    <div class="product-item">
                        <img src="images/cake1.jpg" alt="Product">
                        <p>Carrot Cake</p>
                    </div>
                    </div>
            </section>
        </div>
    </main>
    <bake-footer></bake-footer>
    </body>
</html>
