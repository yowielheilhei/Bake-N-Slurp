<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Menu | Bake 'n Slurp</title>
        <link rel="stylesheet" href="styles.css">
        <script src="components.js"></script>
    </head>
<body>
    <bake-header></bake-header>
    <main>
        <section class="hero">
            <img src="images/hero-cheesecake.jpg" alt="Basque Burnt Cheesecake">
        </section>

        <div class="container">
            <h2 class="section-title">Popular Right Now</h2>
                <div class="bento-grid">
                    <div class="bento-card bento-tall-left">
                        <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=600&q=80" alt="Fabulous Cakes">
                        <h3>Fabulous Cakes</h3>
                    </div>
                    
                    <div class="bento-card">
                        <img src="https://images.unsplash.com/photo-1499636136210-6f4ee915583e?w=600&q=80" alt="Baked Goodies">
                        <h3>Baked Goodies</h3>
                    </div>
                    
                    <div class="bento-card">
                        <img src="https://images.unsplash.com/photo-1628191137573-dee64e727614?w=600&q=80" alt="Sandwiches">
                        <h3>Sandwiches</h3>
                    </div>
                    
                    <div class="bento-card bento-tall-right">
                        <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=600&q=80" alt="Large Food Order">
                        <h3>Large Food Order</h3>
                    </div>
                </div>

            <div class="banner">
                <img src="images/story-collage-banner.jpg" alt="Our Story Collage">
                <h2>Our Story</h2>
            </div>

            <div class="grid-3">
                <div class="card">
                    <img src="images/fabulous-cakes.jpg" alt="Fabulous Cakes">
                    <h3>Fabulous Cakes</h3>
                </div>
                <div class="card">
                    <img src="images/baked-goodies.jpg" alt="Baked Goodies">
                    <h3>Baked Goodies</h3>
                </div>
                <div class="card">
                    <img src="images/large-orders.jpg" alt="Large Food Order">
                    <h3>Large Food Order</h3>
                </div>
            </div>

            <div class="banner">
                <img src="images/services-banner.jpg" alt="Bake n Slurp Services">
                <h2>SERVICES</h2>
            </div>
        </div>
    </main>

    <bake-footer></bake-footer>

</body>
</html>
