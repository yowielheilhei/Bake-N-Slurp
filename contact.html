<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Menu | Bake 'n Slurp</title>
        <link rel="stylesheet" href="global.css">
        <link rel="stylesheet" href="contact.css">
        <script src="components.js"></script>
    </head>
<body>
    <div id="page-loader" class="loader-container">
        <div class="spinner"></div>
    </div>
    <bake-header></bake-header>
    <main class="container">
        <div class="banner">
            <img src="images/contact-hero.jpg" alt="Connect with Us">
            <h2>CONNECT WITH US</h2>
        </div>
        <div class="contact-container">
            <div class="contact-left">
                <div class="contact-info-grid">
                    <div class="info-box">
                        <p><strong>Phone</strong></p>
                        <p>09202649380</p>
                    </div>
                    <div class="info-box">
                        <p><strong>Facebook</strong></p>
                        <p>Bake n' Slurp</p>
                    </div>
                    <div class="info-box">
                        <p><strong>Email</strong></p>
                        <p>resalvematienzo@gmail.com</p>
                    </div>
                    <div class="info-box">
                        <p><strong>Our Shop</strong></p>
                        <p>Balisong, Taal</p>
                    </div>
                </div>
               <div class="map-placeholder">
                    <iframe 
                        src="https://www.google.com/maps/place/Bake'+N+Slurp/@13.9255851,120.9543842,969m/data=!3m2!1e3!4b1!4m6!3m5!1s0x33bd0b0b5989c72d:0x3cc7c41d389c5fe9!8m2!3d13.9255799!4d120.9569538!16s%2Fg%2F11xf2yjz2f?entry=ttu&g_ep=EgoyMDI2MDUxNy4wIKXMDSoASAFQAw%3D%3D" 
                        width="100%" 
                        height="250" 
                        style="border:0; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);" 
                        allowfullscreen="" 
                        loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </div>
            <div class="contact-form">
                <h3>GET IN TOUCH</h3>
                <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
                <form>
                    <div class="form-group">
                        <input type="text" placeholder="Surname, First Name Middle Initial">
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="example08@gmail.com">
                    </div>
                    <div class="form-group">
                        <input type="text" placeholder="Subject">
                    </div>
                    <div class="form-group">
                        <textarea rows="5" placeholder="Message"></textarea>
                    </div>
                    <button type="submit" class="send-btn">Send Now</button>
                </form>
            </div>
        </div>
    </main>
    <bake-footer></bake-footer>
</html>
