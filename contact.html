<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Menu | Bake 'n Slurp</title>
        <link rel="stylesheet" href="global.css">
        <link rel="stylesheet" href="contact.css">
        <script src="components.js"></script>
    </head>
<body>
    <div id="page-loader" class="loader-container">
        <div class="spinner"></div>
    </div>
    <bake-header></bake-header>
    <section class="banner">
        <img src="assets/images/contact/contact-hero.png" alt="Connect with Us">
        <h2>CONNECT WITH US</h2>
        <p>Lorem ipsum labadk nakutyasdbb-0psd</p>
    </section>
    <main class="container">
        <div class="contact-container">
            <div class="contact-left">
                <div class="contact-info-grid">
                    <div class="info-box">
                        <p><strong>✆ Phone</strong></p>
                        <p>09202649380</p>
                    </div>
                    <div class="info-box">
                        <p><strong>ⓕ Facebook</strong></p>
                        <p>Bake n' Slurp</p>
                    </div>
                    <div class="info-box">
                        <p><strong>✉ Email</strong></p>
                        <p>resalvematienzo@gmail.com</p>
                    </div>
                    <div class="info-box">
                        <p><strong>⌂ Our Shop</strong></p>
                        <p>Balisong, Taal, Batangas</p>
                    </div>
                </div>
                <div class="map-placeholder">
                    <iframe 
                    src="https://maps.google.com/maps?q=13°52'50.6%22N+120°56'06.5%22E&z=15&output=embed" 
                    width="100%" 
                    height="250" 
                    style="border:0; border-radius:12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);" 
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade"> 
                </iframe>
                </div>
            </div>
            <div class="contact-form">
                <h3>GET IN TOUCH</h3>
                <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
                <form>
                    <div class="form-group">
                        <h5>Name:</h5>
                        <input type="text" placeholder="Surname, First Name Middle Initial">
                    </div>
                    <div class="form-group">
                        <h5>Email:</h5>
                        <input type="email" placeholder="example08@gmail.com">
                    </div>
                    <div class="form-group">
                        <h5>Subject:</h5>
                        <input type="text" placeholder="Subject">
                    </div>
                    <div class="form-group">
                        <h5>Message:</h5>
                        <textarea rows="5" placeholder="Message"></textarea>
                    </div>
                    <button type="submit" class="send-btn">➤ Send Now</button>
                </form>
            </div>
        </div>
    </main>
    <bake-footer></bake-footer>
</body>
</html>
